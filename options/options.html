<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>LocaleLens Options</title>
    <link rel="stylesheet" href="options.css">
  </head>
  <body>
    <main class="page">
      <header>
        <h1>LocaleLens</h1>
        <p>配置主流大模型或自定义 API，用 AI 分析 Amazon 商品标题并生成全球市场关键词。</p>
      </header>

      <form id="settings-form" class="panel">
        <label>
          <span>Provider</span>
          <select id="provider"></select>
        </label>

        <label>
          <span>API Style</span>
          <select id="apiStyle">
            <option value="openai">OpenAI-compatible</option>
            <option value="anthropic">Anthropic Messages</option>
            <option value="anthropic-bearer">Anthropic-compatible Bearer</option>
          </select>
        </label>

        <label>
          <span>Endpoint</span>
          <input id="endpoint" type="url" autocomplete="off" placeholder="https://api.minimaxi.com/v1/chat/completions">
        </label>

        <label>
          <span>Model</span>
          <input id="model" type="text" autocomplete="off" placeholder="MiniMax-M2.7">
        </label>

        <label>
          <span>API Key</span>
          <input id="apiKey" type="password" autocomplete="off" placeholder="sk-...">
        </label>

        <label>
          <span>Temperature</span>
          <input id="temperature" type="number" min="0" max="1" step="0.1">
        </label>

        <fieldset>
          <legend>Markets</legend>
          <label><input type="checkbox" name="market" value="US"> US</label>
          <label><input type="checkbox" name="market" value="CN"> CN</label>
          <label><input type="checkbox" name="market" value="DE"> DE</label>
          <label><input type="checkbox" name="market" value="FR"> FR</label>
          <label><input type="checkbox" name="market" value="ES"> ES</label>
          <label><input type="checkbox" name="market" value="JP"> JP</label>
        </fieldset>

        <button type="submit">保存配置</button>
        <p id="status" role="status"></p>
      </form>

      <section class="hint">
        <h2>使用方式</h2>
        <ol>
          <li>保存 API 配置。</li>
          <li>打开 Amazon 搜索结果页。</li>
          <li>点击商品标题下方的“AI 分析”。</li>
        </ol>
      </section>
    </main>
    <script src="options.js"></script>
  </body>
</html>
